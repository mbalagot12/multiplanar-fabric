  <text x="183" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#73726C">DGX / HGX / MI350X</text>

  <rect x="40" y="88" width="286" height="118" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="183" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#3C3489">8x GPU</text>

