    <rect x="52" y="152" width="58" height="28" rx="4" fill="#fff" stroke="#7F77DD" stroke-width="0.7"/>
    <text x="81" y="170" text-anchor="middle">GPU 5</text>
    <rect x="118" y="152" width="58" height="28" rx="4" fill="#fff" stroke="#7F77DD" stroke-width="0.7"/>
    <text x="147" y="170" text-anchor="middle">GPU 6</text>
    <rect x="184" y="152" width="58" height="28" rx="4" fill="#fff" stroke="#7F77DD" stroke-width="0.7"/>
