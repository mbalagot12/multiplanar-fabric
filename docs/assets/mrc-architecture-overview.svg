<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">MRC architecture overview</title>
  <desc id="desc">Compute node with eight GPUs and SmartNICs connected to eight independent MRC fabric planes, each with a dedicated leaf-spine pair.</desc>
  <defs>
    <marker id="arrow-pcie" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#BA7517"/>
    </marker>
    <marker id="arrow-fabric" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0F6E56"/>
    </marker>
    <linearGradient id="node-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F4F3EF"/>
    </linearGradient>
    <linearGradient id="fabric-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5FBF8"/>
      <stop offset="100%" stop-color="#EDF6F1"/>
    </linearGradient>
  </defs>

  <rect width="960" height="520" fill="#F8F8F6" rx="12"/>

  <rect x="24" y="36" width="318" height="332" rx="10" fill="url(#node-bg)" stroke="#B4B2A9" stroke-width="1.2"/>
