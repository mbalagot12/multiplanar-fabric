site_name: Multiplanar Fabric AI Networking Primer
site_description: MkDocs site rendering user-supplied HTML pages
site_url: !ENV [MKDOCS_SITE_URL, 'http://127.0.0.1:8000/']

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/html-pages.css

nav:
  - Home: index.md
  - Pages:
      - AMD MI350X — MRC SRv6 Fabric Connectivity: generated/amd-mi350x-mrc-srv6-fabric.md
      - Nvidia DGX H100 — MRC Fabric Integration: generated/dgx-mrc-diagram-1.md
      - GB300 NVL72 — Liquid-Cooled Data Center Rack: generated/gb300-nvl72-dc-rack-1.md
      - 72-GPU MRC Rack — Arista 7060XE7 + Nvidia DGX H100: generated/mrc-72gpu-rack-diagram-1.md
      - 72-GPU Blackwell Ultra MRC Rack — Arista 7060XE7 + Nvidia HGX B300: generated/mrc-blackwell-ultra-rack-1.md
      - MRC Packet Structure — SRv6 + Entropy Value: generated/srv6-mrc-packet-ev-header.md
      - MRC Packet Spray Animation: generated/mrc-packet-spray-animation.md

strict: true
