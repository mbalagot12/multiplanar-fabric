site_name: Multiplanar Fabric AI Networking Primer
site_description: MkDocs site rendering user-supplied HTML pages
site_url: !ENV [MKDOCS_SITE_URL, 'http://127.0.0.1:8000/']

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: ['docs']
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/html-pages.css

extra:
  generator: false

nav:
  - Home: index.md
  - Reference:
      - Glossary: glossary.md
      - SRv6 uN uSID — Leaf/Spine Config (SONiC vs Arista): srv6-usid-leaf-spine-config.md
      - Arista EOS SRv6 uN + uA Config — Plane 1: arista-eos-srv6-un-ua-config.md
      - SRv6 Plane 1 — Packet Traversal: srv6-plane1-packet-traversal.md
  - Pages:
      - AMD MI350X — MRC SRv6 Fabric Connectivity: generated/amd-mi350x-mrc-srv6-fabric.md
      - GB300 NVL72 — Liquid-Cooled Data Center Rack: generated/gb300-nvl72-dc-rack-1.md
      - 72-GPU Blackwell Ultra MRC Rack — Arista 7060XE7 + Nvidia HGX B300: generated/mrc-blackwell-ultra-rack-1.md
      - MRC Packet Structure — SRv6 + Entropy Value: generated/srv6-mrc-packet-ev-header.md
      - MRC Packet Spray Animation: generated/mrc-packet-spray-animation.md

strict: true
